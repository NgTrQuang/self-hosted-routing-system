# Production compose — uses real OSRM with preprocessed data in osrm-data/
# Prerequisite: osrm-data/ must contain preprocessed .osrm files (see DEPLOY.md)
# OSRM file name must match what preprocess.sh produced in osrm-data/

services:
  osrm:
    image: osrm/osrm-backend
    volumes:
      - ./osrm-data:/data
    command: osrm-routed --algorithm mld /data/vietnam-latest.osrm
    ports:
      - "5000:5000"
    restart: always
    networks:
      - routing-net

  postgres:
    image: postgis/postgis:16-3.4-alpine
    environment:
      POSTGRES_DB: routing
      POSTGRES_USER: routing
      POSTGRES_PASSWORD: routing123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    networks:
      - routing-net

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - OSRM_BASE_URL=http://osrm:5000
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=300
      - REQUEST_TIMEOUT=10.0
      - ALLOWED_ORIGINS=*
      - DATABASE_URL=postgresql+asyncpg://routing:routing123@postgres:5432/routing
    depends_on:
      - osrm
      - redis
      - postgres
    restart: always
    networks:
      - routing-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - routing-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    networks:
      - routing-net

networks:
  routing-net:
    driver: bridge

volumes:
  postgres-data:
