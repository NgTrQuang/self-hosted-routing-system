version: "3.9"

# Demo compose — uses mock OSRM stub, no real map data required.
# Usage: docker-compose -f docker-compose.demo.yml up --build

services:
  osrm:
    build: ./mock-osrm
    ports:
      - "5000:5000"
    restart: always
    networks:
      - routing-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - OSRM_BASE_URL=http://osrm:5000
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=300
      - REQUEST_TIMEOUT=10.0
    depends_on:
      osrm:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always
    networks:
      - routing-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
    networks:
      - routing-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: always
    networks:
      - routing-net

networks:
  routing-net:
    driver: bridge
